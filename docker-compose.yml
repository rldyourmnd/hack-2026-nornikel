services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      - qdrant

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_BASE_URL: /api
    ports:
      - "5173:80"
    depends_on:
      - api

  qdrant:
    image: qdrant/qdrant:v1.16.3
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
